<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Initiatives — Pallston</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #container { width: 100%; min-height: 100vh; }
    .loading { 
      text-align: center; 
      padding: 40px; 
      font-size: 18px; 
      color: #666;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .error {
      color: #d32f2f;
      text-align: center;
      padding: 40px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .error h2 { margin-bottom: 10px; }
    .error p { margin-bottom: 20px; color: #666; }
    .debug-info {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      color: #333;
      max-width: 600px;
      margin-top: 20px;
      text-align: left;
    }
  </style>
</head>
<body>
  <div id="container">
    <div class="loading">Loading initiative...</div>
  </div>

  <script>
    const projectMap = {
      'careoneconcept': 'projects/CareOne_dc.html',
      'execboardconcept': 'projects/ExecBoard_dc.html',
      'geoshieldconcept': 'projects/GeoShield_dc.html'
    };

    async function loadProject(projectKey) {
      const container = document.getElementById('container');
      const filePath = projectMap[projectKey];
      
      if (!filePath) {
        container.innerHTML = `
          <div class="error">
            <h2>Initiative Not Found</h2>
            <p>Available initiatives:</p>
            <ul style="list-style: none; margin: 20px 0;">
              <li><a href="#careoneconcept">CareOne Concept</a></li>
              <li><a href="#execboardconcept">ExecBoard Concept</a></li>
              <li><a href="#geoshieldconcept">GeoShield Concept</a></li>
            </ul>
          </div>
        `;
        return;
      }

      try {
        // Show loading state
        container.innerHTML = '<div class="loading">Loading initiative...</div>';
        
        const response = await fetch(filePath);
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const html = await response.text();
        
        // Parse the HTML
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        
        // Get body content
        const bodyContent = doc.body.innerHTML;
        container.innerHTML = bodyContent;
        
        // Load stylesheets from head
        const links = doc.querySelectorAll('head link[rel="stylesheet"]');
        links.forEach(link => {
          const newLink = document.createElement('link');
          newLink.rel = 'stylesheet';
          newLink.href = link.href;
          document.head.appendChild(newLink);
        });

        // Re-execute scripts
        const scripts = doc.querySelectorAll('body script');
        scripts.forEach(script => {
          const newScript = document.createElement('script');
          if (script.src) {
            newScript.src = script.src;
          } else {
            newScript.textContent = script.textContent;
          }
          document.body.appendChild(newScript);
        });

        console.log(`✓ Successfully loaded ${projectKey}`);

      } catch (error) {
        console.error('Load error:', error);
        container.innerHTML = `
          <div class="error">
            <h2>Error Loading Initiative</h2>
            <p>${error.message}</p>
            <div class="debug-info">
              <strong>Attempted to load:</strong><br/>
              ${window.location.origin}/${filePath}<br/><br/>
              <strong>Project:</strong> ${projectKey}<br/>
              <strong>File path:</strong> ${filePath}
            </div>
            <p style="margin-top: 20px;"><a href="#careoneconcept">← Back to CareOne</a></p>
          </div>
        `;
      }
    }

    // Handle hash changes
    function handleHashChange() {
      const hash = window.location.hash.substring(1) || 'careoneconcept';
      console.log(`Loading project: ${hash}`);
      loadProject(hash);
    }

    // Initial load
    handleHashChange();

    // Listen for hash changes
    window.addEventListener('hashchange', handleHashChange);
  </script>
</body>
</html>
