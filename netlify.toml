# Netlify Configuration
[build]
  # No build command needed - static site
  command = ""
  publish = "."

# Ensure all HTML files in projects folder are deployed
[[redirects]]
  from = "/projects/*"
  to = "/projects/:splat"
  status = 200

# Support for anchor links (hash routing)
[[redirects]]
  from = "/initiatives"
  to = "/initiatives.html"
  status = 200

# Cache control
[[headers]]
  for = "/**"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/projects/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"
